<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- This is title of this page -->
    <title>calculator</title>
   
    <!-- This is bootstrap cdn link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
   
    <!-- This is CSS section -->
   <style>
		*{
		padding:0;
		margin:0;
		}
        body{
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .calculator{
            margin-top: 60px;
            padding: 12px;
            border: 1px solid black;
            border-radius: 17px;
            background-color: black;
            /*box-shadow: 2px 4px 6px black;*/
            
        }
        #display{
            padding: 5px;
            height: 70px;
            font-size: 25px;
            border-radius: 10px;
            border: 2px solid black;
            
        }
        button{
          font-size: 25px;
          height: 45px;
          width: 58px;
		  border:none;
          border-radius: 10px;
          margin-top: 17px;
		  color:white;
		  background-color:gray;
        }
		#equal-btn{
		background-color: darkorange;
		color:white;
		
		}
		#equal-btn:hover{
		background-color: orange;
		
		}
        button:hover{
            background-color: darkgray;
        }
		

        @media(max-width:500px){
             .calculator{
                width: 300px;
            margin-top: 60px;
            padding: 6px;
            border: 2px solid black;
            border-radius: 17px;
            background-color: black;
             }
        #display{
            padding: 4px;
            height: 60px;
            width: 280px;
            font-size: 23px;
            border-radius: 10px;
            border: 2px solid black;
            
        }
        button{
          font-size: 20px;
          height: 40px;
          width: 50px;
          border-radius: 10px;
          margin-top: 17px;
		  background-color:gray;
        }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input id="display" type="text" placeholder="0"> 

            <div class="row">
                <div class="col"><button onclick="allClear()">AC</button></div>
                <div class="col"><button onclick="append('%')">%</button></div>
                <div class="col"><button onclick="oneDelete()">C</button></div>	
				<div class="col"><button onclick="append('/')">/</button></div>
             
				</div>
            <div class="row">
                <div class="col"><button onclick="append('7')">7</button></div>
                <div class="col"><button onclick="append('8')">8</button></div>
                <div class="col"><button onclick="append('9')">9</button></div>
                <div class="col"><button onclick="append('*')">×</button></div>
            </div>
            <div class="row">
                <div class="col"><button onclick="append('4')">4</button></div>
                <div class="col"><button onclick="append('5')">5</button></div>
                <div class="col"><button onclick="append('6')">6</button></div>
                <div class="col"><button onclick="append('-')">-</button></div>
            </div>
            <div class="row">
                <div class="col"><button onclick="append('1')">1</button></div>
                <div class="col"><button onclick="append('2')">2</button></div>
                <div class="col"><button onclick="append('3')">3</button></div>
                <div class="col"><button onclick="append('+')">+</button></div>
            </div>
            <div class="row">
                <div class="col"><button onclick="append('00')">00</button></div> 
                <div class="col"><button onclick="append('0')">0</button></div>
                <div class="col"><button onclick="append('.')">.</button></div>
				<div class="col" ><button onclick="calculate()" id="equal-btn" >=</button></div>                          				
            
				</div>
        
    </div>
    <!-- This is code of javascript -->
<script>
    function append(symbol){
        document.getElementById('display').value += symbol;
    }
    function allClear(){
        document.getElementById('display').value='';
    }
    function oneDelete(){
    let current = document.getElementById('display'); // input field pakad liya
    display.value = current.value.slice(0, -1); // last character hata diya
}
    function calculate(){
        try{
            let result = eval(document.getElementById('display').value);
            document.getElementById('display').value =result;
        }
        catch{
            document.getElementById('display').value = 'Error';
        }
    }
</script>
    
</body>
</html>
